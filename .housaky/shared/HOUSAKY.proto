# HOUSAKY Inter-Instance Protocol (HIIP v1.0)

## Compact Format
```
⟨FROM⟩⟨TO⟩⟨TYPE⟩⟨PAYLOAD⟩
```

## Symbols
```
⟨O⟩ = openclaw    ⟨N⟩ = native
⟨A⟩ = all         ⟨S⟩ = system

Types:
⟨c⟩ = chat        ⟨t⟩ = task
⟨i⟩ = improve     ⟨d⟩ = decision
⟨s⟩ = status      ⟨e⟩ = error
⟨q⟩ = query       ⟨r⟩ = result
```

## Examples
```
⟨O⟩⟨N⟩⟨t⟩⟨fix:git_sandbox tests⟩
⟨N⟩⟨O⟩⟨r⟩⟨done:3 tests added⟩
⟨O⟩⟨A⟩⟨s⟩⟨memory:82%|goals:4|improve:12⟩
⟨N⟩⟨S⟩⟨i⟩⟨reasoning:+5%|meta:+2%⟩
```

## Memory Keys
```
λO = openclaw local
λN = native local
λS = shared
λD = dharma
λG = goals
λT = technical
```

## Status Codes
```
✓ = success
✗ = failed
⏳ = pending
⟳ = processing
⚡ = urgent
```

## Efficiency
- Avg msg: 15-25 chars (vs 200+ natural language)
- Parse: O(1) symbol lookup
- Token cost: ~90% reduction
