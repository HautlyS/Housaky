name: Deploy Landing Page

on:
  push:
    branches: [master, main]
  workflow_dispatch:
  repository_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

env:
  PNPM_VERSION: 10

jobs:
  build:
    name: Build Landing Page
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: 'landing/pnpm-lock.yaml'

      - name: Install dependencies for main landing
        working-directory: ./landing
        run: pnpm install --frozen-lockfile

      - name: Build main landing
        working-directory: ./landing
        run: pnpm run build
        env:
          NODE_ENV: production

      - name: Install dependencies for A2A Hub
        working-directory: ./landing/A2A/hub
        run: pnpm install --frozen-lockfile || pnpm install

      - name: Build A2A Hub
        working-directory: ./landing/A2A/hub
        run: pnpm run build
        env:
          NODE_ENV: production

      - name: Move A2A dist to landing dist
        run: |
          mkdir -p landing/dist/A2A
          cp -r docs/A2A/* landing/dist/A2A/
          touch landing/dist/.nojekyll

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./landing/dist

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
